<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsy Tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a2e, #1a1a4e);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .logo { font-size: 3rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
        .logo span { color: #4fc3f7; }
        .tagline { font-size: 1.2rem; color: #b0bec5; margin-bottom: 40px; }
        .app-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 30px 40px;
            max-width: 400px;
            width: 100%;
            margin-bottom: 40px;
        }
        .app-name { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
        .app-desc { font-size: 1rem; color: #b0bec5; line-height: 1.6; }
        .contact { font-size: 0.95rem; color: #78909c; margin-top: 20px; }
        .contact a { color: #4fc3f7; text-decoration: none; }
        .contact a:hover { text-decoration: underline; }
        footer { position: fixed; bottom: 20px; font-size: 0.85rem; color: #546e7a; }
    </style>
</head>
<body>
    <div class="logo">Sonsy<span>Tech</span></div>
    <p class="tagline">Experts in Chip Design from concept to production</p>
